<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wisdom Daily</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <p class="site-title">Wisdom Daily</p>
      <p class="date" id="date"></p>
      <div id="quote-container"></div>
      <button onclick="loadRandom()">Generate new quotes</button>
    </div>

    <script src="quotes.js"></script>
    <script>
      const today = new Date();
      document.getElementById("date").textContent = today.toLocaleDateString("en-US", {
        weekday: "long", month: "long", day: "numeric"
      });

      function displayPair(pair) {
        document.getElementById("quote-container").innerHTML = `
          <p class="thread">Today's thread — ${pair.theme}</p>
          <div class="divider"></div>
          <div class="quote">
            <p class="quote-text">"${pair.quotes[0].text}"</p>
            <p class="attribution">${pair.quotes[0].author} &nbsp;·&nbsp; <span class="tradition">${pair.quotes[0].tradition}, ${pair.quotes[0].year}</span></p>
          </div>
          <div class="separator">&#10022;</div>
          <div class="quote">
            <p class="quote-text">"${pair.quotes[1].text}"</p>
            <p class="attribution">${pair.quotes[1].author} &nbsp;·&nbsp; <span class="tradition">${pair.quotes[1].tradition}, ${pair.quotes[1].year}</span></p>
          </div>
          <div class="divider"></div>
          <p class="reflect-label">Reflect</p>
          <p class="reflect-text">${pair.reflection}</p>
        `;
      }

      function loadDaily() {
        const dayOfYear = Math.floor(
          (today - new Date(today.getFullYear(), 0, 0)) / 86400000
        );
        displayPair(quotePairs[dayOfYear % quotePairs.length]);
      }

      function loadRandom() {
        const randomIndex = Math.floor(Math.random() * quotePairs.length);
        displayPair(quotePairs[randomIndex]);
      }

      loadDaily();
    </script>
  </body>
</html>
